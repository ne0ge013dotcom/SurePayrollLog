name: Weekly Webflow Activity Report

on:
  # Every Monday at 13:00 UTC (8am Chicago / 9am EDT)
  schedule:
    - cron: '0 13 * * 1'

  # Also allow manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      backfill_from:
        description: 'Optional: backfill from this date (YYYY-MM-DD). Leave blank for normal weekly run.'
        required: false
        type: string

permissions:
  contents: write  # needed to commit the new report back to the repo

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weekly report generator
        if: ${{ github.event.inputs.backfill_from == '' || github.event.inputs.backfill_from == null }}
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
        run: |
          python scripts/weekly_run.py

      - name: Run backfill (manual trigger only)
        if: ${{ github.event.inputs.backfill_from != '' && github.event.inputs.backfill_from != null }}
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
        run: |
          python scripts/backfill.py --from "${{ github.event.inputs.backfill_from }}" --skip-existing

      - name: Commit and push new reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Add each path only if it exists, so a partial run still commits what it has
          for path in reports/ pages/ index.html search_index.json; do
            if [ -e "$path" ]; then
              git add "$path"
              echo "Staged: $path"
            else
              echo "Skipped (does not exist): $path"
            fi
          done
          echo "--- Status:"
          git status --short
          if git diff --staged --quiet; then
            echo "No new reports to commit."
          else
            git commit -m "Add weekly activity report ($(date -u +%Y-%m-%d))"
            git push
          fi

      # Optional: deploy via GitHub Pages (uncomment if you set up Pages)
      # - name: Deploy to GitHub Pages
      #   uses: peaceiris/actions-gh-pages@v3
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./
